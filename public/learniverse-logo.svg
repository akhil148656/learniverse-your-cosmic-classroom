  <path d="M24 18v28h20v-6H31V18h-7Z" fill="#FFFFFF"/>

  <!-- Small star -->
  <path d="M16.5 28l1.2 3.2 3.3 1.2-3.3 1.2-1.2 3.2-1.2-3.2-3.3-1.2 3.3-1.2 1.2-3.2Z" fill="#FFFFFF" opacity="0.9"/>
</svg>
